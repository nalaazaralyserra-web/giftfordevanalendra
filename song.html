<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Song 🎵</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #5c0612; /* Tema Maroon Gelap */
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container Utama */
        .collage-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* KANVAS KOLASE SCRAPBOOK */
        .scrapbook-canvas {
            background-color: #f2e9e1; 
            background-image: radial-gradient(#d5cbb8 1px, transparent 1px);
            background-size: 24px 24px;
            width: 100%;
            aspect-ratio: 1.1 / 1; 
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. TAG MERAH DI BELAKANG */
        .red-tag {
            position: absolute;
            width: 38%;
            height: 70%;
            background-color: #a6192e;
            border-radius: 25px;
            left: 15%;
            top: 15%;
            transform: rotate(-3deg);
            box-shadow: -5px 10px 20px rgba(0,0,0,0.15);
            z-index: 1; /* Paling belakang */
        }
        /* Lubang Tag & Pita Putih */
        .red-tag::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            width: 20px;
            height: 20px;
            background-color: #f2e9e1;
            border-radius: 50%;
        }
        .ribbon {
            position: absolute;
            top: -10px;
            left: 14%;
            width: 110px;
            height: 100px;
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-bottom: none;
            border-right: none;
            border-top-left-radius: 80px;
            border-bottom-left-radius: 10px;
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 2;
        }

        /* 2. PIRINGAN HITAM / VINYL */
        .vinyl-wrapper {
            position: absolute;
            width: 48%;
            aspect-ratio: 1 / 1;
            right: 10%;
            top: 12%;
            cursor: pointer;
            z-index: 3; /* Di atas tag merah */
            transition: transform 0.3s ease;
        }
        .vinyl-wrapper:hover {
            transform: scale(1.03);
        }
        .vinyl {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #333 10%, #111 30%, #222 45%, #000 65%, #222 70%);
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .vinyl::after {
            content: '';
            position: absolute;
            width: 85%;
            height: 85%;
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }
        .vinyl-label {
            width: 32%;
            height: 32%;
            background-color: #a6192e;
            border: 3px solid #fffdfa;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.5rem;
            color: #fffdfa;
            font-weight: bold;
            text-align: center;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
            z-index: 4;
        }

        /* ANIMASI SPINNING */
        .spinning {
            animation: spin 5s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* 3. FOTO FILM STRIP (3 Foto Menumpuk Vertikal) */
        .film-strip {
            position: absolute;
            width: 25%;
            background-color: white;
            padding: 8px 8px 15px 8px;
            box-shadow: 5px 10px 25px rgba(0,0,0,0.2);
            left: 20%;
            bottom: 8%;
            transform: rotate(-1deg);
            z-index: 5; /* Di atas piringan hitam sedikit */
        }
        .film-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #111;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .film-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
        }
        .film-strip::before, .film-strip::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 100%;
            top: 0;
            border-left: 2px dashed #ddd;
            border-right: 2px dashed #ddd;
            opacity: 0.5;
        }
        .film-strip::before { left: 2px; }
        .film-strip::after { right: 2px; }

        /* 4. KARTU LIRIK / KOTAK TEKS (Sengaja diberi z-index: 10 agar selalu di paling atas) */
        .lyrics-card {
            position: absolute;
            width: 52%;
            background-color: #fffdfa;
            border-radius: 12px;
            padding: 25px;
            right: 8%;
            bottom: 8%;
            box-shadow: 8px 12px 30px rgba(0,0,0,0.25);
            z-index: 10; /* Z-INDEX TINGGI BIAR DI DEPAN FRAME FOTO & VINYL */
            border-top: 5px solid #a6192e;
        }
        .lyrics-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #111;
            margin-bottom: 12px;
            font-style: italic;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
        }
        .lyrics-card h2 span {
            font-family: 'Great Vibes', cursive;
            font-size: 1.5rem;
            color: #a6192e;
            display: block;
            margin-bottom: -10px;
        }
        .lyrics-card p {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #444;
            text-align: justify;
        }

        /* 5. DEKORASI BUNGA DAISY DI TENGAH */
        .daisy-flower {
            position: absolute;
            width: 25%;
            height: auto;
            left: 36%;
            top: 25%;
            transform: rotate(-10deg);
            z-index: 11; /* Taruh di atas kartu teks sedikit biar manis */
            pointer-events: none;
            filter: drop-shadow(2px 5px 5px rgba(0,0,0,0.2));
        }

        /* Petunjuk Interaktif */
        .tap-hint {
            color: #fffdfa;
            font-size: 0.85rem;
            font-style: italic;
            margin-top: 15px;
            opacity: 0.8;
            text-align: center;
        }

        /* TOMBOL NEXT */
        .next-btn {
            margin-top: 35px;
            background-color: #a6192e;
            color: #fffdfa;
            border: 2px solid #fffdfa;
            padding: 12px 35px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .next-btn:hover {
            background-color: #fffdfa;
            color: #a6192e;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.4);
        }

        /* ================= RESPONSIVE MOBILE (HP) ================= */
        @media (max-width: 600px) {
            .scrapbook-canvas {
                aspect-ratio: auto;
                height: 540px; /* Ditambah tinggi sedikit biar pas */
            }
            .red-tag {
                width: 50%;
                height: 48%;
                left: 8%;
                top: 8%;
            }
            .ribbon {
                left: 6%;
                width: 90px;
            }
            .vinyl-wrapper {
                width: 55%;
                right: 5%;
                top: 8%;
                z-index: 3;
            }
            .film-strip {
                width: 34%;
                left: 8%;
                bottom: 8%;
                padding: 5px 5px 10px 5px;
                z-index: 4; /* Tetap di bawah teks */
            }
            .lyrics-card {
                width: 65%;
                right: 5%;
                bottom: 8%;
                padding: 15px;
                z-index: 10; /* Tetap memaksa berada di tumpukan paling depan */
            }
            .lyrics-card h2 {
                font-size: 1.4rem;
                margin-bottom: 8px;
            }
            .lyrics-card p {
                font-size: 0.75rem;
                line-height: 1.4;
            }
            .daisy-flower {
                width: 28%;
                left: 30%;
                top: 26%;
                z-index: 11;
            }
        }
    </style>
</head>
<body>

    <div class="collage-container">
        
        <div class="scrapbook-canvas">
            
            <div class="ribbon"></div>

            <div class="red-tag"></div>

            <div class="vinyl-wrapper" onclick="togglePlay()">
                <div class="vinyl" id="vinylDisk">
                    <div class="vinyl-label">TAP TO<br>PLAY</div>
                </div>
            </div>

            <div class="film-strip">
                <div class="film-frame">
                    <img src="m6.jpg" alt="Film Photo 1">
                </div>
                <div class="film-frame">
                    <img src="m7.jpg" alt="Film Photo 2">
                </div>
                <div class="film-frame">
                    <img src="m8.jpg" alt="Film Photo 3">
                </div>
            </div>

            <img src="flowers-daisy.png" alt="Daisy" class="daisy-flower">

            <div class="lyrics-card">
                <h2><span>Westlife</span> I Lay My Love On You</h2>
                <p>
                    I lay my love on you , you make me feel brand new, show me your love and walk right through. I lay my love on you, it's all i wanna do  every time i breathe i feel BRAND NEW. You opened up my heart ♡
                </p>
            </div>

        </div>

        <p class="tap-hint">Tap the vinyl to play our favorite song 🎵</p>

        <audio id="myAudio" src="song.mp3" loop></audio>

        <a href="closing.html" class="next-btn">
            Next ➔
        </a>

    </div>

    <script>
        const audio = document.getElementById('myAudio');
        const vinylDisk = document.getElementById('vinylDisk');
        const vinylLabel = document.querySelector('.vinyl-label');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                vinylDisk.classList.add('spinning');
                vinylLabel.innerHTML = "PLAYING<br>♪";
            } else {
                audio.pause();
                vinylDisk.classList.remove('spinning');
                vinylLabel.innerHTML = "TAP TO<br>PLAY";
            }
        }
    </script>

</body>
</html>
