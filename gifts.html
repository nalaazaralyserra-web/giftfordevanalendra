<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifts For You 🎁</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital@0;1&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #5c0612; /* Maroon gelap */
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0; /* Mulai dari transparan untuk efek fade-in */
            animation: fadeInPage 0.8s ease forwards;
        }

        /* Animasi Masuk Halaman */
        @keyframes fadeInPage {
            to {
                opacity: 1;
            }
        }

        .gifts-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 950px;
        }

        .title {
            font-family: 'Great Vibes', cursive;
            color: #f7e1d7;
            font-size: 4rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Grid Item Kado (Responsif 2x2 di HP) */
        .gifts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 100%;
            justify-items: center;
            align-items: center;
        }

        .gift-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            text-decoration: none;
            width: 100%;
            max-width: 150px;
        }
        .gift-item:hover {
            transform: translateY(-10px);
        }

        /* Gambar Ikon Kado */
        .gift-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
        }

        .gift-label {
            font-family: 'Playfair Display', serif;
            color: #f7e1d7;
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-style: italic;
            text-align: center;
        }

        /* Responsif Screen Laptop (Berjejer 1x4 menyamping) */
        @media (min-width: 768px) {
            .title { font-size: 5.5rem; margin-bottom: 60px; }
            .gifts-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 50px;
            }
            .gift-item { max-width: 180px; }
            .gift-img { width: 130px; height: 130px; }
            .gift-label { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="gifts-container">
        <h1 class="title">Gifts for you</h1>
        
        <div class="gifts-grid">
            <div class="gift-item" onclick="window.location.href='massage.html'">
                <img src="message.jpg" alt="Message" class="gift-img">
                <span class="gift-label">Message</span>
            </div>

            <div class="gift-item" onclick="window.location.href='memories.html'">
                <img src="memories.jpg" alt="Memories" class="gift-img">
                <span class="gift-label">Memories</span>
            </div>

            <div class="gift-item" onclick="window.location.href='flowers.html'">
                <img src="flowers.jpg" alt="Flowers" class="gift-img">
                <span class="gift-label">Flowers</span>
            </div>

            <div class="gift-item" onclick="window.location.href='song.html'">
                <img src="song.jpg" alt="Song" class="gift-img">
                <span class="gift-label">Song</span>
            </div>
        </div>
    </div>

</body>
</html>
