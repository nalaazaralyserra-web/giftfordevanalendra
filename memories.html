<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories 🧸</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #5c0612; font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .book-container { background-color: #fffdfa; background-image: linear-gradient(#e8e4db 1px, transparent 1px), linear-gradient(90deg, #e8e4db 1px, transparent 1px); background-size: 20px 20px; width: 100%; max-width: 1100px; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; position: relative; overflow: hidden; border: 4px solid #4a050e; }
        
        /* TOMBOL KEMBALI KREATIF KE #GIFTS */
        .back-btn { position: absolute; top: 15px; right: 20px; background-color: #5c0612; color: #fffdfa; border: none; width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; text-decoration: none; font-weight: bold; z-index: 100; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        .binder { display: none; }
        .page { width: 100%; padding: 40px 25px; display: flex; flex-direction: column; gap: 35px; position: relative; }
        .scrap-item { position: relative; background: white; padding: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 100%; max-width: 280px; margin: 0 auto; }
        .polaroid { padding-bottom: 30px; }
        .polaroid img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .polaroid .caption { font-family: 'Playfair Display', serif; font-style: italic; text-align: center; margin-top: 10px; color: #444; font-size: 0.9rem; }
        .photo-strip { border: 5px solid #fff; background: #fff; }
        .photo-strip img { width: 100%; display: block; }
        .washi-tape { position: absolute; top: -15px; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 100px; height: 25px; background-color: rgba(166, 25, 46, 0.4); border-left: 3px dashed rgba(255,255,255,0.5); border-right: 3px dashed rgba(255,255,255,0.5); z-index: 5; }
        .memo-pad { background-color: #a6192e; color: #fffdfa; padding: 20px; font-family: 'Playfair Display', serif; box-shadow: 0 6px 15px rgba(0,0,0,0.15); transform: rotate(2deg); }
        .memo-pad.cream { background-color: #f2e9e1; color: #333; border-left: 5px solid #a6192e; transform: rotate(-1deg); }
        .memo-pad h3 { font-family: 'Great Vibes', cursive; font-size: 2rem; margin-bottom: 8px; }
        .memo-pad p { font-size: 0.95rem; line-height: 1.5; }
        .main-title { font-family: 'Great Vibes', cursive; color: #5c0612; font-size: 3.5rem; text-align: center; margin-bottom: 10px; width: 100%; }

        @media (min-width: 900px) {
            .book-container { flex-direction: row; min-height: 700px; }
            .page { width: 50%; padding: 50px 40px; display: block; }
            .main-title { position: absolute; top: 30px; left: 40px; text-align: left; width: auto; }
            .binder { display: block; position: absolute; left: 50%; top: 0; bottom: 0; width: 30px; transform: translateX(-50%); background-image: linear-gradient(90deg, transparent 45%, #333 45%, #333 55%, transparent 55%), radial-gradient(circle, #222 6px, transparent 7px); background-size: 100% 100%, 30px 40px; background-repeat: repeat-y; z-index: 50; opacity: 0.85; }
            .item-1 { position: absolute; top: 140px; left: 40px; transform: rotate(-4deg); }
            .item-2 { position: absolute; bottom: 50px; left: 60px; transform: rotate(3deg); }
            .item-3 { position: absolute; top: 180px; right: 40px; transform: rotate(5deg); }
            .item-4 { position: absolute; top: 60px; left: 50px; transform: rotate(-2deg); }
            .item-5 { position: absolute; top: 80px; right: 45px; transform: rotate(4deg); }
            .item-6 { position: absolute; bottom: 60px; left: 80px; transform: rotate(-3deg); }
            .item-7 { position: absolute; bottom: 40px; right: 40px; transform: rotate(1deg); }
        }
    </style>
</head>
<body>

    <div class="book-container">
        <!-- LINK TOMBOL BALIK NYASAR KE SINI -->
        <a href="gifts.html" class="back-btn">✕</a>
        
        <div class="binder"></div>

        <div class="page">
            <h1 class="main-title">Our Memories</h1>
            <div class="scrap-item polaroid item-1">
                <div class="washi-tape"></div>
                <img src="m1.jpg" alt="M1"><div class="caption">The beginning of us ✨</div>
            </div>
            <div class="scrap-item memo-pad cream item-2">
                <h3>Today's Note</h3>
                <p>Setiap foto punya cerita sendiri, dan bersamamu adalah cerita terbaik yang pernah aku miliki.</p>
            </div>
            <div class="scrap-item photo-strip item-3">
                <div class="washi-tape" style="background-color: rgba(8c, 6, 18, 0.3);"></div>
                <img src="m2.jpg" alt="M2">
            </div>
        </div>

        <div class="page">
            <div class="scrap-item polaroid item-4">
                <img src="m3.jpg" alt="M3"><div class="caption">My favorite place is next to you 🐻</div>
            </div>
            <div class="scrap-item memo-pad item-5">
                <h3>I Love You</h3>
                <p>Terima kasih ya sudah melukis banyak warna indah di hari-hariku.</p>
            </div>
            <div class="scrap-item polaroid item-6">
                <div class="washi-tape"></div>
                <img src="m4.jpg" alt="M4">
            </div>
            <div class="scrap-item photo-strip item-7">
                <img src="m5.jpg" alt="M5">
            </div>
        </div>
    </div>

</body>
</html>
